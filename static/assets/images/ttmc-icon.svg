<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="t-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#0d0818"/>
    </radialGradient>
    <radialGradient id="t-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="t-face" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="t-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <clipPath id="t-clip">
      <rect x="0" y="0" width="200" height="200" rx="20"/>
    </clipPath>
  </defs>

  <g clip-path="url(#t-clip)">
    <!-- Background -->
    <rect width="200" height="200" rx="20" fill="url(#t-bg)"/>
    <ellipse cx="100" cy="90" rx="80" ry="80" fill="url(#t-glow)"/>

    <!-- Grid lines -->
    <g opacity="0.08" stroke="#818cf8" stroke-width="0.5">
      <line x1="0" y1="25" x2="200" y2="25"/><line x1="0" y1="50" x2="200" y2="50"/>
      <line x1="0" y1="75" x2="200" y2="75"/><line x1="0" y1="100" x2="200" y2="100"/>
      <line x1="0" y1="125" x2="200" y2="125"/><line x1="0" y1="150" x2="200" y2="150"/>
      <line x1="0" y1="175" x2="200" y2="175"/>
      <line x1="25" y1="0" x2="25" y2="200"/><line x1="50" y1="0" x2="50" y2="200"/>
      <line x1="75" y1="0" x2="75" y2="200"/><line x1="100" y1="0" x2="100" y2="200"/>
      <line x1="125" y1="0" x2="125" y2="200"/><line x1="150" y1="0" x2="150" y2="200"/>
      <line x1="175" y1="0" x2="175" y2="200"/>
    </g>

    <!-- Corner scan brackets -->
    <g stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 52 L22 22 L52 22"/>
      <path d="M148 22 L178 22 L178 52"/>
      <path d="M22 148 L22 178 L52 178"/>
      <path d="M178 148 L178 178 L148 178"/>
    </g>

    <!-- Scan line glow -->
    <rect x="30" y="96" width="140" height="8" fill="url(#t-scan)" opacity="0.15" filter="url(#t-blur)"/>
    <line x1="30" y1="100" x2="170" y2="100" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
    <defs>
      <linearGradient id="t-scan" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="transparent"/>
        <stop offset="50%" stop-color="#38bdf8"/>
        <stop offset="100%" stop-color="transparent"/>
      </linearGradient>
    </defs>

    <!-- Face silhouette -->
    <ellipse cx="100" cy="88" rx="34" ry="42" fill="#1e1040" stroke="url(#t-face)" stroke-width="1.5"/>

    <!-- Hair -->
    <path d="M66 80 C66 56 80 46 100 46 C120 46 134 56 134 80"
          fill="#130d28" stroke="#818cf8" stroke-width="1.2" opacity="0.9"/>

    <!-- Forehead feature points -->
    <circle cx="80" cy="68" r="1.5" fill="#38bdf8" opacity="0.8"/>
    <circle cx="120" cy="68" r="1.5" fill="#38bdf8" opacity="0.8"/>
    <circle cx="100" cy="64" r="1.5" fill="#38bdf8" opacity="0.8"/>

    <!-- Eyebrows -->
    <path d="M80 78 Q88 74 96 76" stroke="#818cf8" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M104 76 Q112 74 120 78" stroke="#818cf8" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Eye sockets -->
    <ellipse cx="88" cy="88" rx="10" ry="7" fill="#0f0820" stroke="#818cf8" stroke-width="1" opacity="0.8"/>
    <ellipse cx="112" cy="88" rx="10" ry="7" fill="#0f0820" stroke="#818cf8" stroke-width="1" opacity="0.8"/>

    <!-- Eyes iris -->
    <circle cx="88" cy="88" r="5" fill="#38bdf8" opacity="0.9"/>
    <circle cx="112" cy="88" r="5" fill="#38bdf8" opacity="0.9"/>
    <!-- Pupils -->
    <circle cx="88" cy="88" r="2.5" fill="#050310"/>
    <circle cx="112" cy="88" r="2.5" fill="#050310"/>
    <!-- Eye highlight -->
    <circle cx="90" cy="86" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="114" cy="86" r="1.2" fill="white" opacity="0.7"/>

    <!-- Nose bridge -->
    <path d="M100 94 L96 104 Q100 107 104 104 L100 94" stroke="#818cf8" stroke-width="1.2" fill="none" opacity="0.7"/>

    <!-- Mouth -->
    <path d="M88 116 Q100 124 112 116" stroke="url(#t-face)" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Face landmark dots -->
    <g fill="#38bdf8" opacity="0.7">
      <circle cx="78" cy="88" r="1.5"/>
      <circle cx="122" cy="88" r="1.5"/>
      <circle cx="100" cy="108" r="1.5"/>
      <circle cx="88" cy="116" r="1.5"/>
      <circle cx="112" cy="116" r="1.5"/>
      <circle cx="72" cy="100" r="1.5"/>
      <circle cx="128" cy="100" r="1.5"/>
    </g>

    <!-- Landmark connection lines -->
    <g stroke="#38bdf8" stroke-width="0.6" opacity="0.3">
      <line x1="78" y1="88" x2="88" y2="88"/>
      <line x1="112" y1="88" x2="122" y2="88"/>
      <line x1="88" y1="116" x2="100" y2="108"/>
      <line x1="100" y1="108" x2="112" y2="116"/>
      <line x1="72" y1="100" x2="78" y2="88"/>
      <line x1="128" y1="100" x2="122" y2="88"/>
    </g>

    <!-- Chin/jaw landmark -->
    <circle cx="100" cy="130" r="1.5" fill="#38bdf8" opacity="0.7"/>
    <circle cx="80" cy="124" r="1.5" fill="#818cf8" opacity="0.6"/>
    <circle cx="120" cy="124" r="1.5" fill="#818cf8" opacity="0.6"/>

    <!-- Neural network nodes (bottom area) -->
    <g fill="#818cf8" opacity="0.5">
      <circle cx="40" cy="160" r="4"/>
      <circle cx="70" cy="155" r="4"/>
      <circle cx="100" cy="162" r="4"/>
      <circle cx="130" cy="155" r="4"/>
      <circle cx="160" cy="160" r="4"/>
    </g>
    <g fill="#38bdf8" opacity="0.4">
      <circle cx="55" cy="175" r="3"/>
      <circle cx="85" cy="170" r="3"/>
      <circle cx="115" cy="170" r="3"/>
      <circle cx="145" cy="175" r="3"/>
    </g>
    <!-- NN connections -->
    <g stroke="#818cf8" stroke-width="0.7" opacity="0.25">
      <line x1="40" y1="160" x2="70" y2="155"/>
      <line x1="70" y1="155" x2="100" y2="162"/>
      <line x1="100" y1="162" x2="130" y2="155"/>
      <line x1="130" y1="155" x2="160" y2="160"/>
      <line x1="55" y1="175" x2="40" y2="160"/>
      <line x1="55" y1="175" x2="70" y2="155"/>
      <line x1="85" y1="170" x2="70" y2="155"/>
      <line x1="85" y1="170" x2="100" y2="162"/>
      <line x1="115" y1="170" x2="100" y2="162"/>
      <line x1="115" y1="170" x2="130" y2="155"/>
      <line x1="145" y1="175" x2="130" y2="155"/>
      <line x1="145" y1="175" x2="160" y2="160"/>
    </g>

    <!-- Match percentage label -->
    <rect x="58" y="140" width="84" height="18" rx="9" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="100" y="152.5" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.9">MATCH: 97.4%</text>

    <!-- Side data labels -->
    <g font-family="monospace" font-size="7" fill="#818cf8" opacity="0.55">
      <text x="14" y="88">EYE_L</text>
      <text x="154" y="88">EYE_R</text>
      <text x="14" y="102">JAW</text>
      <text x="156" y="102">NOSE</text>
    </g>
    <!-- Label lines -->
    <g stroke="#818cf8" stroke-width="0.6" opacity="0.3">
      <line x1="36" y1="86" x2="76" y2="88"/>
      <line x1="152" y1="86" x2="124" y2="88"/>
    </g>
  </g>
</svg>
