<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="s-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#130f28"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <radialGradient id="s-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s-pos" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="s-neg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="s-neu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <clipPath id="s-clip">
      <rect x="0" y="0" width="200" height="200" rx="20"/>
    </clipPath>
  </defs>

  <g clip-path="url(#s-clip)">
    <!-- Background -->
    <rect width="200" height="200" rx="20" fill="url(#s-bg)"/>
    <ellipse cx="100" cy="100" rx="100" ry="100" fill="url(#s-glow)"/>

    <!-- Dot grid -->
    <g fill="#818cf8" opacity="0.07">
      <circle cx="20" cy="20" r="1.5"/><circle cx="40" cy="20" r="1.5"/><circle cx="60" cy="20" r="1.5"/>
      <circle cx="80" cy="20" r="1.5"/><circle cx="100" cy="20" r="1.5"/><circle cx="120" cy="20" r="1.5"/>
      <circle cx="140" cy="20" r="1.5"/><circle cx="160" cy="20" r="1.5"/><circle cx="180" cy="20" r="1.5"/>
      <circle cx="20" cy="40" r="1.5"/><circle cx="40" cy="40" r="1.5"/><circle cx="60" cy="40" r="1.5"/>
      <circle cx="80" cy="40" r="1.5"/><circle cx="100" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/>
      <circle cx="140" cy="40" r="1.5"/><circle cx="160" cy="40" r="1.5"/><circle cx="180" cy="40" r="1.5"/>
    </g>

    <!-- POSITIVE bubble (top left) -->
    <rect x="10" y="14" width="88" height="52" rx="12" fill="#0a1e14" stroke="url(#s-pos)" stroke-width="1.5"/>
    <!-- Bubble tail -->
    <path d="M24 66 L14 80 L38 66" fill="#0a1e14" stroke="url(#s-pos)" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Happy face in positive bubble -->
    <circle cx="30" cy="40" r="14" fill="#0d2218" stroke="#34d399" stroke-width="1.2"/>
    <circle cx="26" cy="37" r="2" fill="#34d399"/>
    <circle cx="34" cy="37" r="2" fill="#34d399"/>
    <path d="M23 44 Q30 50 37 44" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Positive text lines -->
    <rect x="52" y="26" width="38" height="4" rx="2" fill="#34d399" opacity="0.6"/>
    <rect x="52" y="34" width="32" height="3" rx="1.5" fill="#34d399" opacity="0.35"/>
    <rect x="52" y="41" width="36" height="3" rx="1.5" fill="#34d399" opacity="0.35"/>
    <rect x="52" y="48" width="28" height="3" rx="1.5" fill="#34d399" opacity="0.25"/>
    <!-- Positive label -->
    <rect x="50" y="55" width="40" height="8" rx="4" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-width="0.8"/>
    <text x="70" y="61.5" text-anchor="middle" font-family="monospace" font-size="6" fill="#34d399">POSITIVE</text>

    <!-- NEGATIVE bubble (middle right) -->
    <rect x="102" y="54" width="88" height="52" rx="12" fill="#1a0a0a" stroke="url(#s-neg)" stroke-width="1.5"/>
    <!-- Bubble tail -->
    <path d="M176 54 L186 40 L162 54" fill="#1a0a0a" stroke="url(#s-neg)" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Sad face in negative bubble -->
    <circle cx="122" cy="80" r="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1.2"/>
    <circle cx="118" cy="76" r="2" fill="#f87171"/>
    <circle cx="126" cy="76" r="2" fill="#f87171"/>
    <path d="M115 86 Q122 80 129 86" stroke="#f87171" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Negative text lines -->
    <rect x="142" y="62" width="38" height="4" rx="2" fill="#f87171" opacity="0.6"/>
    <rect x="142" y="70" width="30" height="3" rx="1.5" fill="#f87171" opacity="0.35"/>
    <rect x="142" y="77" width="34" height="3" rx="1.5" fill="#f87171" opacity="0.35"/>
    <rect x="142" y="84" width="26" height="3" rx="1.5" fill="#f87171" opacity="0.25"/>
    <!-- Negative label -->
    <rect x="140" y="90" width="44" height="8" rx="4" fill="#f87171" fill-opacity="0.15" stroke="#f87171" stroke-width="0.8"/>
    <text x="162" y="96.5" text-anchor="middle" font-family="monospace" font-size="6" fill="#f87171">NEGATIVE</text>

    <!-- NEUTRAL bubble (bottom center) -->
    <rect x="30" y="108" width="88" height="52" rx="12" fill="#100d20" stroke="url(#s-neu)" stroke-width="1.5"/>
    <path d="M60 160 L50 174 L74 160" fill="#100d20" stroke="url(#s-neu)" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Neutral face -->
    <circle cx="52" cy="134" r="14" fill="#110d22" stroke="#818cf8" stroke-width="1.2"/>
    <circle cx="48" cy="130" r="2" fill="#818cf8"/>
    <circle cx="56" cy="130" r="2" fill="#818cf8"/>
    <line x1="46" y1="138" x2="58" y2="138" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <!-- Neutral text lines -->
    <rect x="74" y="118" width="36" height="4" rx="2" fill="#818cf8" opacity="0.55"/>
    <rect x="74" y="126" width="30" height="3" rx="1.5" fill="#818cf8" opacity="0.3"/>
    <rect x="74" y="133" width="34" height="3" rx="1.5" fill="#818cf8" opacity="0.3"/>
    <rect x="74" y="140" width="24" height="3" rx="1.5" fill="#818cf8" opacity="0.2"/>
    <!-- Neutral label -->
    <rect x="72" y="147" width="40" height="8" rx="4" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-width="0.8"/>
    <text x="92" y="153.5" text-anchor="middle" font-family="monospace" font-size="6" fill="#818cf8">NEUTRAL</text>

    <!-- Sentiment wave chart at bottom -->
    <rect x="10" y="176" width="180" height="16" rx="4" fill="#0f0c20" stroke="#818cf8" stroke-width="0.6" stroke-opacity="0.3"/>
    <polyline points="15,186 30,180 45,188 60,178 75,184 90,180 105,186 120,179 135,185 145,178 160,182 175,179 185,183"
              stroke="url(#s-pos)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- chart labels -->
    <text x="100" y="192" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#818cf8" opacity="0.5">SENTIMENT WAVE</text>

    <!-- AI brain icon (top right corner) -->
    <g transform="translate(148, 10)" opacity="0.55">
      <circle cx="22" cy="16" r="14" stroke="#38bdf8" stroke-width="1.2" fill="#0d0e1e"/>
      <!-- Brain lobes suggestion -->
      <path d="M22 8 C16 8 10 12 10 18 C10 22 13 25 17 26 L22 28 L27 26 C31 25 34 22 34 18 C34 12 28 8 22 8 Z"
            stroke="#38bdf8" stroke-width="1" fill="none" opacity="0.7"/>
      <line x1="22" y1="8" x2="22" y2="28" stroke="#38bdf8" stroke-width="0.8" opacity="0.4"/>
      <!-- Neural dots -->
      <circle cx="15" cy="15" r="2" fill="#38bdf8" opacity="0.8"/>
      <circle cx="29" cy="15" r="2" fill="#818cf8" opacity="0.8"/>
      <circle cx="22" cy="22" r="2" fill="#a5f3fc" opacity="0.8"/>
      <line x1="15" y1="15" x2="22" y2="22" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
      <line x1="29" y1="15" x2="22" y2="22" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
      <line x1="15" y1="15" x2="29" y2="15" stroke="#a5f3fc" stroke-width="0.8" opacity="0.3"/>
    </g>

    <!-- Percentage indicators -->
    <text x="54" y="96" text-anchor="middle" font-family="monospace" font-size="8" fill="#34d399" font-weight="bold">62%</text>
    <text x="146" y="140" text-anchor="middle" font-family="monospace" font-size="8" fill="#f87171" font-weight="bold">23%</text>
    <text x="74" y="174" text-anchor="middle" font-family="monospace" font-size="8" fill="#818cf8" font-weight="bold">15%</text>
  </g>
</svg>
